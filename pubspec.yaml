name: safecampus_ai
description: App inteligente de seguridad para estudiantes
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Supabase
  supabase_flutter: ^2.5.0

  # Google Maps
  #google_maps_flutter: ^2.6.0
  geolocator: ^11.0.0
  geocoding: ^3.0.0

  # IA Gemini
  google_generative_ai: ^0.4.3

  # Estado Global
  flutter_riverpod: ^2.5.1

  # Navegación
  go_router: ^13.2.0

  # Gráficas
  fl_chart: ^0.67.0

  # Mapa + HeatMap
  flutter_map: ^6.1.0
  latlong2: ^0.9.1

  # Imágenes
  image_picker: ^1.1.2
  cached_network_image: ^3.3.1

  # Base de datos local
  hive_flutter: ^1.1.0
  hive: ^2.2.3

  # Notificaciones
  flutter_local_notifications: ^17.1.2

  # UI y Animaciones
  lottie: ^3.1.0
  shimmer: ^3.0.0
  animate_do: ^3.3.4

  # Utilidades
  logger: ^2.3.0
  intl: ^0.19.0
  url_launcher: ^6.3.0
  share_plus: ^9.0.0
  connectivity_plus: ^6.0.3
  flutter_dotenv: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.9

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - .env
